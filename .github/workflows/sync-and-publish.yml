name: Sync TYPO3 TypeScript Sources and Publish

on:
  schedule:
    # Check daily at 2 AM for new tags
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Specific TYPO3 tag (e.g. v14.0.0 or v13.4.0)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      has_new_version: ${{ steps.check.outputs.has_new_version }}
      typo3_version: ${{ steps.check.outputs.typo3_version }}
      target_branch: ${{ steps.config.outputs.target_branch }}
      major_version: ${{ steps.config.outputs.major_version }}
    steps:
      - name: Checkout split repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine TYPO3 major version from branch
        id: config
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "v13.x" ]]; then
            echo "major_version=13" >> $GITHUB_OUTPUT
            echo "target_branch=v13.x" >> $GITHUB_OUTPUT
          else
            echo "major_version=14" >> $GITHUB_OUTPUT
            echo "target_branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Check for new TYPO3 tags
        id: check
        run: |
          MAJOR="${{ steps.config.outputs.major_version }}"

          # Fetch all tags from TYPO3 repository for the target major version
          git ls-remote --tags https://github.com/TYPO3/typo3.git | \
            grep -E "refs/tags/v${MAJOR}\.[0-9]+\.[0-9]+$" | \
            sed 's/.*refs\/tags\///' | \
            sort -V > /tmp/typo3_tags.txt

          # Get last synced tag
          LAST_SYNCED=""
          if [ -f .last-synced-tag ]; then
            LAST_SYNCED=$(cat .last-synced-tag)
          fi

          # Manual tag input takes priority
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            NEW_TAG="${{ github.event.inputs.tag }}"
            # Validate that the manual tag matches the expected major version
            if ! echo "$NEW_TAG" | grep -qE "^v${MAJOR}\."; then
              echo "Error: Tag $NEW_TAG does not match expected major version v${MAJOR}.x for this branch"
              echo "has_new_version=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Manually specified tag: $NEW_TAG"
          else
            # Find newest tag that has not been synced yet
            NEW_TAG=$(tail -n1 /tmp/typo3_tags.txt)
          fi

          if [ -z "$NEW_TAG" ]; then
            echo "No TYPO3 v${MAJOR}.x tag found"
            echo "has_new_version=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$NEW_TAG" = "$LAST_SYNCED" ]; then
            echo "No new version available (current: $LAST_SYNCED)"
            echo "has_new_version=false" >> $GITHUB_OUTPUT
          else
            echo "New version found: $NEW_TAG (previous: $LAST_SYNCED)"
            echo "has_new_version=true" >> $GITHUB_OUTPUT
            echo "typo3_version=$NEW_TAG" >> $GITHUB_OUTPUT
          fi

  sync-and-publish:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.has_new_version == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Git
        run: |
          git config --global user.name "TYPO3 TypeScript Sync Bot"
          git config --global user.email "bot@maikschneider.de"

      - name: Clone TYPO3 repository at specific tag
        run: |
          TYPO3_TAG="${{ needs.check-and-sync.outputs.typo3_version }}"
          echo "Cloning TYPO3 repository at tag: $TYPO3_TAG"

          git clone --depth 1 --branch "$TYPO3_TAG" \
            https://github.com/TYPO3/typo3.git typo3-source

      - name: Extract TypeScript sources
        run: |
          mkdir -p typescript-split

          # Copy TypeScript sources
          if [ -d "typo3-source/Build/Sources/TypeScript" ]; then
            cp -r typo3-source/Build/Sources/TypeScript/* typescript-split/
            echo "✓ TypeScript sources extracted"
          else
            echo "✗ Error: Build/Sources/TypeScript not found"
            exit 1
          fi

          # Copy relevant root files
          [ -f "typo3-source/LICENSE.txt" ] && cp typo3-source/LICENSE.txt typescript-split/
          [ -f "typo3-source/README.md" ] && cp typo3-source/README.md typescript-split/README-TYPO3.md

      - name: Checkout split repository
        uses: actions/checkout@v4
        with:
          path: split-repo
          ref: ${{ needs.check-and-sync.outputs.target_branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Sync content to split repository
        run: |
          # Delete old contents (except .git, .github, package.json)
          cd split-repo
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'package.json' \
            ! -name 'package-lock.json' \
            ! -name '.last-synced-tag' \
            ! -name 'README.md' \
            ! -name 'node_modules' \
            -exec rm -rf {} +

          # Copy new contents
          cp -r ../typescript-split/* .

          # Save synced tag
          echo "${{ needs.check-and-sync.outputs.typo3_version }}" > .last-synced-tag

      - name: Create/Update package.json
        working-directory: split-repo
        run: |
          TYPO3_VERSION="${{ needs.check-and-sync.outputs.typo3_version }}"
          # Remove 'v' prefix for npm version
          NPM_VERSION="${TYPO3_VERSION#v}"

          cat > package.json << EOF
          {
            "name": "typo3-typescript-sources",
            "version": "${NPM_VERSION}",
            "description": "TYPO3 Core TypeScript Sources - Extracted from TYPO3/typo3 repository",
            "main": "index.js",
            "types": "index.d.ts",
            "scripts": {
              "test": "echo \"No tests specified\""
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/maikschneider/typo3-typescript-sources.git"
            },
            "keywords": [
              "typo3",
              "typescript",
              "sources",
              "cms"
            ],
            "author": "TYPO3 Core Team",
            "license": "GPL-2.0-or-later",
            "bugs": {
              "url": "https://github.com/maikschneider/typo3-typescript-sources/issues"
            },
            "homepage": "https://github.com/maikschneider/typo3-typescript-sources#readme",
            "publishConfig": {
              "access": "public"
            },
            "typo3": {
              "sourceRepository": "https://github.com/TYPO3/typo3",
              "sourceTag": "${TYPO3_VERSION}",
              "sourcePath": "Build/Sources/TypeScript"
            }
          }
          EOF

          echo "✓ package.json created with version $NPM_VERSION"

      - name: Create README
        working-directory: split-repo
        run: |
          TYPO3_VERSION="${{ needs.check-and-sync.outputs.typo3_version }}"

          cat > README.md << 'EOF'
          # TYPO3 TypeScript Sources

          [![Sync and Publish](https://github.com/maikschneider/typo3-typescript-sources/actions/workflows/sync-and-publish.yml/badge.svg)](https://github.com/maikschneider/typo3-typescript-sources/actions/workflows/sync-and-publish.yml)
          [![npm version](https://badge.fury.io/js/typo3-typescript-sources.svg)](https://www.npmjs.com/package/typo3-typescript-sources)
          [![License: GPL v2](https://img.shields.io/badge/License-GPL%20v2-blue.svg)](https://www.gnu.org/licenses/old-licenses/gpl-2.0.en.html)

          This repository contains the TypeScript sources from the TYPO3 Core, automatically extracted and published to npm.

          ## 📦 Installation

          ```bash
          npm install typo3-typescript-sources
          ```

          ## 🔍 Source

          - **Original Repository:** [TYPO3/typo3](https://github.com/TYPO3/typo3)
          - **Source Path:** `Build/Sources/TypeScript/`
          - **Current TYPO3 Version:** `TYPO3_VERSION_PLACEHOLDER`

          ## 🌿 Branches

          | Branch   | TYPO3 Version | npm tag   |
          |----------|---------------|-----------|
          | `main`   | v14.x         | `latest`  |
          | `v13.x`  | v13.x         | `v13`     |

          ## 📝 License

          This package maintains the same license as TYPO3 Core: **GPL-2.0-or-later**

          ## 🤖 Automation

          This repository is automatically synchronized with TYPO3 Core releases via GitHub Actions.

          ## ⚠️ Note

          This is an unofficial split package maintained by [@maikschneider](https://github.com/maikschneider).
          For official TYPO3 packages, please refer to the [TYPO3 Core repository](https://github.com/TYPO3/typo3).
          EOF

          # Replace placeholder
          sed -i "s/TYPO3_VERSION_PLACEHOLDER/${TYPO3_VERSION}/" README.md

      - name: Commit changes
        working-directory: split-repo
        run: |
          TARGET_BRANCH="${{ needs.check-and-sync.outputs.target_branch }}"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          TYPO3_VERSION="${{ needs.check-and-sync.outputs.typo3_version }}"
          git commit -m "Sync with TYPO3 ${TYPO3_VERSION}

          Source: https://github.com/TYPO3/typo3/tree/${TYPO3_VERSION}
          Path: Build/Sources/TypeScript/"

          # Create tag (remove v-prefix)
          NPM_VERSION="${TYPO3_VERSION#v}"
          git tag -a "${NPM_VERSION}" -m "Release ${NPM_VERSION} from TYPO3 ${TYPO3_VERSION}"

          git push origin "${TARGET_BRANCH}"
          git push origin "${NPM_VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: split-repo
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

          MAJOR="${{ needs.check-and-sync.outputs.major_version }}"
          if [ "$MAJOR" = "13" ]; then
            npm publish --access public --tag v13
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          tag_name: ${{ needs.check-and-sync.outputs.typo3_version }}
          release_name: TYPO3 ${{ needs.check-and-sync.outputs.typo3_version }}
          body: |
            Synchronized with TYPO3 Core ${{ needs.check-and-sync.outputs.typo3_version }}

            **Source:** https://github.com/TYPO3/typo3/tree/${{ needs.check-and-sync.outputs.typo3_version }}
            **Path:** `Build/Sources/TypeScript/`
          draft: false
          prerelease: false

  trigger-v13-sync:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync for v13.x branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sync-and-publish.yml',
              ref: 'v13.x'
            });
